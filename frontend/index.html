<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dam.fm — Listen to Polymarket Live | Prediction Market Sonification</title>
<meta name="description" content="Turn Polymarket prediction markets into live generative music. dam.fm sonifies real-time crypto and event market data — hear the market move.">
<meta name="keywords" content="polymarket, prediction markets, sonification, crypto music, polymarket live, polymarket alerts, data sonification, generative music, market data, dam.fm">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="dam.fm — Listen to Polymarket Live">
<meta property="og:description" content="Real-time prediction market data turned into generative music. Pick a market, hear it move.">
<meta property="og:url" content="https://dam.fm">
<meta property="og:site_name" content="dam.fm — Data as Music">

<!-- Twitter -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="dam.fm — Listen to Polymarket Live">
<meta name="twitter:description" content="Real-time prediction market data turned into generative music. Pick a market, hear it move.">

<link rel="canonical" href="https://dam.fm/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="stylesheet" href="/static/style.css?v=2">
<script src="/static/strudel-bundle.js"></script>
</head>
<body>
<div class="container">
  <h1>DATA AS MUSIC</h1>
  <div class="subtitle">Polymarket DJ. <span id="listeners" style="color:#555; font-size:11px; margin-left:8px;"></span></div>
  <div class="nav-links">
    <a href="/" class="active">Home</a>
    <a href="/sandbox">Sandbox</a>
    <a href="/about">About</a>
    <a href="/donate">Donate</a>
    <a href="/contact">Contact</a>
  </div>

  <!-- Audio Engine -->
  <div class="panel">
    <div class="panel-header">
      <h2>Audio</h2>
      <div class="audio-status">
        <span class="dot" id="audio-dot"></span>
        <span id="audio-label">Stopped</span>
      </div>
    </div>
    <div id="audio-prompt" class="audio-prompt">Please choose a market below</div>
    <div class="audio-grid" id="audio-grid" style="display:none">
      <div class="audio-controls">
        <button id="audio-toggle-btn" onclick="toggleAudio()">Play</button>
        <button id="share-btn" onclick="shareUrl()" title="Copy link to clipboard" style="background:#333; border:1px solid #555; color:#aaa; font-size:12px; padding:4px 10px; cursor:pointer; border-radius:4px;">Share</button>
      </div>
      <div class="audio-track">
        <label style="color:#555; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Track</label>
        <select id="track-select" onchange="onTrackChange()"></select>
      </div>
      <div class="audio-volume">
        <label style="color:#555; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Volume</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="range" id="volume-slider" min="0" max="100" value="70" style="width:100px; min-width:60px; flex:1;" oninput="onVolumeChange(this.value)">
          <span id="volume-label" style="color:#00aaff; font-size:12px; min-width:30px;">70%</span>
        </div>
      </div>
      <div class="audio-sensitivity">
        <label style="color:#555; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Sensitivity</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="range" id="sensitivity-slider" min="0" max="100" value="50" style="width:100px; min-width:60px; flex:1;" oninput="onSensitivityChange(this.value)">
          <span id="sensitivity-label" style="color:#ff9900; font-size:12px; min-width:30px;">50%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing" id="np" style="display:none">
    <div class="np-header">
      <div class="np-question" id="np-question"></div>
      <a class="np-link" id="np-link" href="#" target="_blank" rel="noopener">View Market &#x2197;</a>
    </div>
    <div class="np-mood" id="np-mood"></div>
    <div class="data-grid" id="np-data"></div>
  </div>

  <!-- Connection Status -->
  <div class="panel">
    <div class="row">
      <span class="dot" id="ws-dot"></span>
      <span id="ws-label">Connecting...</span>
    </div>
  </div>

  <!-- Data Source -->
  <div class="panel">
    <div class="panel-header">
      <h2>Data Source</h2>
      <button class="refresh-btn" id="browse-refresh-btn" onclick="refreshBrowse()" title="Refresh markets">&#x21bb;</button>
    </div>
    <div class="url-row">
      <input type="text" id="url-input" placeholder="Paste market URL to play..." onkeydown="if(event.key==='Enter')playUrl()">
      <button onclick="playUrl()">Play URL</button>
    </div>
    <div class="url-status" id="url-status"></div>

    <div style="margin-top:6px;">
      <div id="browse-tabs" class="browse-tabs"></div>
      <div id="browse-results" style="margin-top:8px;"></div>
    </div>
  </div>

  <div id="log"></div>

  <div class="donate-footer">
    <a href="/sandbox" style="color:#555;">Sandbox & Mastering</a> &middot;
    <a href="/about" style="color:#555;">About</a> &middot;
    <a href="/donate" style="color:#555;">Donate</a> &middot;
    Data as Music — <a href="https://github.com/creaseygit/data_as_music" target="_blank" rel="noopener" style="color:#555;">Source Code</a> (AGPL-3.0)
  </div>
</div>

<script src="/static/ws-client.js"></script>
<script src="/static/audio-engine.js"></script>
<script src="/static/app.js"></script>
<!-- Strudel loaded from local bundle (strudel-bundle.js); all pattern functions are globals after initStrudel() -->
</body>
</html>
