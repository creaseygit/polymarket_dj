<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mastering — Data as Music</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="stylesheet" href="/static/style.css">
<style>
.master-grid { display: flex; flex-direction: column; gap: 12px; }
.voice-row {
  display: grid;
  grid-template-columns: 100px auto 1fr 50px;
  gap: 10px;
  align-items: center;
  padding: 8px 12px;
  background: #0d0d15;
  border: 1px solid #1a1a2e;
  border-radius: 6px;
}
.voice-row.muted { opacity: 0.35; }
.voice-label { color: #ccc; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.voice-btns { display: flex; gap: 4px; }
.voice-btns button {
  padding: 3px 8px; font-size: 10px; min-width: 28px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px;
}
.voice-btns button.solo-active { background: #ff9900; color: #0a0a0f; border-color: #ff9900; }
.voice-btns button.mute-active { background: #ff4444; color: #0a0a0f; border-color: #ff4444; }
.voice-val { color: #00aaff; font-size: 12px; text-align: right; min-width: 40px; }
.master-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.master-volume-row {
  display: grid;
  grid-template-columns: 100px 1fr 50px;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  background: #081a0e;
  border: 1px solid #00ff8844;
  border-radius: 6px;
}
.nav-links { display: flex; gap: 12px; margin-bottom: 16px; }
.nav-links a { color: #00aaff; text-decoration: none; font-size: 12px; padding: 4px 10px; border: 1px solid #00aaff44; border-radius: 4px; }
.nav-links a:hover { background: #00aaff22; }
.info-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.info-row .data-cell { min-width: 80px; }
</style>
<script src="/static/strudel-bundle.js"></script>
</head>
<body>
<div class="container">
  <h1>MASTERING</h1>
  <div class="subtitle">Per-voice gain mixing against live market data.</div>
  <div class="nav-links">
    <a href="/">Main</a>
    <a href="/sandbox">Sandbox</a>
  </div>

  <!-- Audio Control -->
  <div class="panel">
    <div class="panel-header"><h2>Audio</h2>
      <div class="audio-status">
        <span class="dot" id="audio-dot"></span>
        <span id="audio-label">Stopped</span>
      </div>
    </div>
    <div style="display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center;">
      <button id="audio-toggle-btn" onclick="toggleAudio()">Play</button>
      <div class="audio-track">
        <label style="color:#555; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Track</label>
        <select id="track-select" onchange="onTrackChange()"></select>
      </div>
      <div>
        <label style="color:#555; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;">Sensitivity</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="range" id="sensitivity-slider" min="0" max="100" value="50" style="width:80px;" oninput="onSensitivityChange(this.value)">
          <span id="sensitivity-label" style="color:#ff9900; font-size:12px;">50%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Master Volume -->
  <div class="panel">
    <h2>Master</h2>
    <div class="master-volume-row">
      <span class="voice-label" style="color:#00ff88;">Master Volume</span>
      <input type="range" id="master-volume" min="0" max="100" value="70" oninput="onMasterVolume(this.value)">
      <span class="voice-val" id="master-volume-val" style="color:#00ff88;">0.70</span>
    </div>
  </div>

  <!-- Voice Sliders -->
  <div class="panel">
    <div class="panel-header">
      <h2>Voices</h2>
    </div>
    <div id="voices-container" class="master-grid">
      <div style="color:#555; font-size:12px;">Select a track to see voices.</div>
    </div>
    <div class="master-actions">
      <button onclick="resetAll()">Reset All</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="document.getElementById('import-file').click()">Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>
  </div>

  <!-- Now Playing Info -->
  <div class="panel" id="np-panel" style="display:none">
    <h2>Now Playing</h2>
    <div id="np-question" style="color:#00ff88; margin-bottom:8px;"></div>
    <div class="info-row">
      <div class="data-grid" id="np-data" style="width:100%;"></div>
    </div>
  </div>

  <div id="log"></div>
  <div class="donate-footer">
    <a href="/">Back to main</a>
  </div>
</div>

<script src="/static/ws-client.js"></script>
<script src="/static/audio-engine.js"></script>
<script>
// ── Mastering Page Logic ──

let audioRunning = false;
let currentMarketSlug = null;
let currentEventSlug = null;
const soloState = {};
const muteState = {};

function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  line.textContent = '[' + t + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── Track loading (same pattern as main app) ──
let _tracksLoaded = false;
function loadTrackScripts(tracks) {
  if (_tracksLoaded) return Promise.resolve();
  _tracksLoaded = true;
  return Promise.all(tracks.map(t => new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = `/static/tracks/${t.name}.js`;
    s.onload = resolve;
    s.onerror = () => { console.warn('[Tracks] Failed to load:', t.name); resolve(); };
    document.head.appendChild(s);
  })));
}

async function onWsStatus(data) {
  const sel = document.getElementById('track-select');
  if (sel.options.length === 0 && data.tracks) {
    await loadTrackScripts(data.tracks);
    const groups = {};
    data.tracks.forEach(t => {
      const cat = t.category || 'music';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(t);
    });
    [['music', 'Music'], ['alert', 'Alerts'], ['diagnostic', 'Diagnostic']].forEach(([key, label]) => {
      if (!groups[key]) return;
      const og = document.createElement('optgroup');
      og.label = label;
      groups[key].forEach(t => og.appendChild(new Option(t.label, t.name)));
      sel.add(og);
    });
    // Auto-render voices for first track
    renderVoices();
  }
}

function onWsMarketData(data) {
  const panel = document.getElementById('np-panel');
  if (panel) panel.style.display = '';
  const npData = document.getElementById('np-data');
  if (npData) {
    npData.innerHTML = [
      ['HEAT', data.heat], ['PRICE', data.price], ['VELOCITY', data.velocity],
      ['TRADE RATE', data.trade_rate], ['SPREAD', data.spread], ['TONE', data.tone ? 'MAJ' : 'MIN']
    ].map(([l, v]) => '<div class="data-cell"><div class="lbl">' + l + '</div><div class="val">' + v + '</div></div>').join('');
  }
  if (audioRunning) audioEngine.onMarketData(data);
}

function onWsMarketInfo(market) {
  if (!market) return;
  currentMarketSlug = market.slug;
  document.getElementById('np-question').textContent = market.question;
}

function onWsEvent(msg) {
  if (audioRunning) audioEngine.handleEvent(msg);
}
function onWsConnected() { log('Connected'); }
function onWsDisconnected() { log('Reconnecting...'); }
function onWsError(msg) { log('Error: ' + msg); }

// ── Audio control ──
async function startAudio() {
  const btn = document.getElementById('audio-toggle-btn');
  btn.textContent = 'Loading...'; btn.disabled = true;
  try {
    await audioEngine.init();
    const track = document.getElementById('track-select').value;
    await audioEngine.selectTrack(track);
    audioRunning = true;
    overrideGetGain();
    updateAudioUI();
    log('Audio started');
  } catch (e) { log('ERR: ' + e.message); }
  btn.disabled = false;
}

function stopAudio() {
  audioEngine.stop();
  audioRunning = false;
  updateAudioUI();
}

function toggleAudio() {
  if (audioRunning) stopAudio(); else startAudio();
}

function onTrackChange() {
  const track = document.getElementById('track-select').value;
  if (audioRunning) {
    audioEngine.selectTrack(track);
    overrideGetGain();
  }
  wsClient.send({ action: 'track', name: track });
  renderVoices();
  updateAudioUI();
}

function updateAudioUI() {
  const btn = document.getElementById('audio-toggle-btn');
  const dot = document.getElementById('audio-dot');
  dot.className = 'dot ' + (audioRunning ? 'dot-on' : 'dot-off');
  btn.textContent = audioRunning ? 'Stop' : 'Play';
  btn.className = audioRunning ? 'danger' : 'ready';
  document.getElementById('audio-label').textContent = audioRunning
    ? 'Playing: ' + document.getElementById('track-select').value : 'Stopped';
}

let sensTimer = null;
function onSensitivityChange(rawVal) {
  document.getElementById('sensitivity-label').textContent = parseInt(rawVal) + '%';
  if (sensTimer) clearTimeout(sensTimer);
  sensTimer = setTimeout(() => { wsClient.send({ action: 'sensitivity', value: parseInt(rawVal) / 100 }); }, 200);
}

function onMasterVolume(rawVal) {
  const v = parseInt(rawVal) / 100;
  document.getElementById('master-volume-val').textContent = v.toFixed(2);
  audioEngine.setVolume(v);
}

// ── Voice rendering ──
function getTrack() {
  const name = document.getElementById('track-select').value;
  const reg = audioEngine.getTrackRegistry();
  return reg[name] || null;
}

function renderVoices() {
  const container = document.getElementById('voices-container');
  const track = getTrack();
  if (!track || !track.voices) {
    container.innerHTML = '<div style="color:#555; font-size:12px;">This track has no voice controls.</div>';
    return;
  }

  // Clear solo/mute state
  Object.keys(soloState).forEach(k => delete soloState[k]);
  Object.keys(muteState).forEach(k => delete muteState[k]);

  container.innerHTML = Object.entries(track.voices).map(([id, v]) => {
    const val = track.gains[id] ?? v.default ?? 1.0;
    return `<div class="voice-row" id="vr-${id}">
      <span class="voice-label">${v.label}</span>
      <div class="voice-btns">
        <button id="solo-${id}" onclick="toggleSolo('${id}')">S</button>
        <button id="mute-${id}" onclick="toggleMute('${id}')">M</button>
      </div>
      <input type="range" id="slider-${id}" min="0" max="200" value="${Math.round(val * 100)}"
        step="1" oninput="onVoiceSlider('${id}', this.value)">
      <span class="voice-val" id="val-${id}">${val.toFixed(2)}</span>
    </div>`;
  }).join('');
}

function onVoiceSlider(voiceId, rawVal) {
  const track = getTrack();
  if (!track) return;
  const val = parseInt(rawVal) / 100;
  track.gains[voiceId] = val;
  document.getElementById('val-' + voiceId).textContent = val.toFixed(2);
}

// ── Solo / Mute ──
function toggleSolo(id) {
  soloState[id] = !soloState[id];
  updateSoloMuteUI();
}

function toggleMute(id) {
  muteState[id] = !muteState[id];
  updateSoloMuteUI();
}

function updateSoloMuteUI() {
  const track = getTrack();
  if (!track || !track.voices) return;
  const anySoloed = Object.values(soloState).some(v => v);

  Object.keys(track.voices).forEach(id => {
    const btn_s = document.getElementById('solo-' + id);
    const btn_m = document.getElementById('mute-' + id);
    const row = document.getElementById('vr-' + id);
    if (btn_s) btn_s.className = soloState[id] ? 'solo-active' : '';
    if (btn_m) btn_m.className = muteState[id] ? 'mute-active' : '';
    const isMuted = muteState[id] || (anySoloed && !soloState[id]);
    if (row) row.className = isMuted ? 'voice-row muted' : 'voice-row';
  });
}

// Override track.getGain to respect solo/mute
function overrideGetGain() {
  const track = audioEngine.getCurrentTrack();
  if (!track || !track.voices) return;
  const anySoloed = () => Object.values(soloState).some(v => v);

  track.getGain = function(voice) {
    if (muteState[voice]) return 0;
    if (anySoloed() && !soloState[voice]) return 0;
    return this.gains[voice] ?? this.voices[voice]?.default ?? 1.0;
  };
}

// ── Reset ──
function resetAll() {
  const track = getTrack();
  if (!track || !track.voices) return;
  Object.entries(track.voices).forEach(([id, v]) => {
    track.gains[id] = v.default ?? 1.0;
    const slider = document.getElementById('slider-' + id);
    const val = document.getElementById('val-' + id);
    if (slider) slider.value = Math.round((v.default ?? 1.0) * 100);
    if (val) val.textContent = (v.default ?? 1.0).toFixed(2);
  });
  Object.keys(soloState).forEach(k => delete soloState[k]);
  Object.keys(muteState).forEach(k => delete muteState[k]);
  updateSoloMuteUI();
}

// ── Export / Import JSON ──
function exportJSON() {
  const track = getTrack();
  if (!track || !track.voices) return;
  const voices = {};
  Object.entries(track.voices).forEach(([id, v]) => {
    voices[id] = track.gains[id] ?? v.default ?? 1.0;
  });
  const data = {
    format: "dam.fm/mastering",
    version: 1,
    track: track.name,
    timestamp: new Date().toISOString(),
    voices,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${track.name}-mastering.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  log('Exported mastering for ' + track.name);
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.format !== 'dam.fm/mastering') { log('Invalid format'); return; }
      const track = getTrack();
      if (!track) return;
      if (data.track && data.track !== track.name) {
        log('Warning: file is for "' + data.track + '", loaded track is "' + track.name + '"');
      }
      Object.entries(data.voices || {}).forEach(([id, val]) => {
        if (!track.voices[id]) return;
        track.gains[id] = val;
        const slider = document.getElementById('slider-' + id);
        const valEl = document.getElementById('val-' + id);
        if (slider) slider.value = Math.round(val * 100);
        if (valEl) valEl.textContent = val.toFixed(2);
      });
      log('Imported mastering from ' + file.name);
    } catch (err) { log('Import error: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Init ──
log('Mastering page ready. Connect to a market and press Play.');
wsClient.connect();
</script>
</body>
</html>
